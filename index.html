<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clunky Critters</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/brain.js/2.0.0-beta.23/brain-browser.min.js"></script>
</head>
<body>

    <div id="screen-main" class="screen full-center">
        <h1 class="game-title">CLUNKY<br>CRITTERS</h1>
        <button class="play-btn" onclick="showScreen('screen-hub')">▶ PLAY</button>
    </div>

    <div id="screen-hub" class="screen full-center hidden">
        <h2 class="section-title">GAME HUB</h2>
        <div class="hub-row">
            <button class="hub-btn" onclick="showScreen('screen-body')">
                <span class="icon">🔧</span><br>Body Forge
            </button>
            <button class="hub-btn" onclick="showScreen('screen-brain')">
                <span class="icon">🧠</span><br>Brain Lab
            </button>
            <button class="hub-btn" onclick="showScreen('screen-race')">
                <span class="icon">🏁</span><br>The Arena
            </button>
        </div>
        <button class="back-btn mt-20" onclick="showScreen('screen-main')">⬅ Back to Title</button>
    </div>

    <div id="screen-body" class="screen hidden layout-workspace">
        <div class="sidebar">
            <h3>Parts Box</h3>
            <p class="hint">Drag a node to the canvas. Click and drag between nodes to connect.</p>
            <div class="drag-item" draggable="true" id="drag-joint">🔵 Joint Node</div>
            <div class="drag-item" draggable="true" id="drag-bone">🦴 Bone Connect</div>
            <div class="drag-item" draggable="true" id="drag-muscle">🔴 Muscle Connect</div>
            <button class="back-btn w-100 mt-20" onclick="showScreen('screen-hub')">⬅ Back</button>
        </div>
        <div class="main-area">
            <h2>Body Forge</h2>
            <div class="canvas-container blueprint-bg">
                <canvas id="body-canvas" width="800" height="500"></canvas>
            </div>
        </div>
    </div>

    <div id="screen-brain" class="screen hidden layout-workspace">
        <div class="sidebar">
            <h3>Neural Nodes</h3>
            <p class="hint">Drag nodes to canvas. Click and drag to wire.</p>
            <div class="drag-item" draggable="true" id="drag-input">👁️ Input Node</div>
            <div class="drag-item" draggable="true" id="drag-hidden">⚙️ Hidden Node</div>
            <div class="drag-item" draggable="true" id="drag-wire">🔗 Wire Tool</div>
            <button class="back-btn w-100 mt-20" onclick="showScreen('screen-hub')">⬅ Back</button>
        </div>
        <div class="main-area">
            <h2>Brain Lab</h2>
            <div class="canvas-container dark-grid">
                <canvas id="brain-canvas" width="800" height="500"></canvas>
            </div>
        </div>
    </div>

    <div id="screen-race" class="screen hidden layout-arena">
        <div class="top-bar">
            <h2>🏁 The Arena</h2>
            <div class="teacher-tools">
                <button class="vote-btn good">👍 Reward</button>
                <button class="vote-btn bad">👎 Punish</button>
                <button class="back-btn" onclick="showScreen('screen-hub')">⬅ Back</button>
            </div>
        </div>
        <div class="canvas-container race-bg">
            <canvas id="race-canvas" width="1200" height="400"></canvas>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="builder.js"></script>
    <script src="ui.js"></script>
</body>
</html>
