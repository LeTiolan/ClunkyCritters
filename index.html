<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clunky Critters</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/brain.js/2.0.0-beta.23/brain-browser.min.js"></script>
</head>
<body>

    <div id="screen-main" class="screen">
        <h1>Clunky Critters</h1>
        <p>Build the body. Wire the brain. Survive the arena.</p>
        <button class="play-btn" onclick="showScreen('screen-hub')">▶ PLAY</button>
    </div>

    <div id="screen-hub" class="screen hidden">
        <h2>Game Hub</h2>
        <div class="hub-buttons">
            <button class="big-btn" onclick="showScreen('screen-body')">🔧<br>Body Forge</button>
            <button class="big-btn" onclick="showScreen('screen-brain')">🧠<br>Brain Lab</button>
            <button class="big-btn" onclick="showScreen('screen-race')">🏁<br>The Arena</button>
        </div>
        <button class="back-btn" onclick="showScreen('screen-main')">⬅ Back to Title</button>
    </div>

    <div id="screen-body" class="screen hidden app-layout">
        <div class="sidebar">
            <h3>Parts Box</h3>
            <p class="hint-text">Drag parts to canvas</p>
            <div class="drag-item" draggable="true">🔵 Joint Ball</div>
            <div class="drag-item" draggable="true">🦴 Bone</div>
            <div class="drag-item" draggable="true">🔴 Muscle</div>
        </div>
        <div class="main-area">
            <h2>The Body Forge</h2>
            <div class="canvas-container">
                <canvas id="body-canvas" width="600" height="400"></canvas>
            </div>
            <button class="back-btn" onclick="showScreen('screen-hub')">⬅ Back to Hub</button>
        </div>
    </div>

    <div id="screen-brain" class="screen hidden app-layout">
        <div class="sidebar">
            <h3>Nodes</h3>
            <p class="hint-text">Drag to network</p>
            <div class="drag-item" draggable="true">👁️ Input</div>
            <div class="drag-item" draggable="true">⚙️ Hidden</div>
            <div class="drag-item" draggable="true">🔗 Wire Tool</div>
        </div>
        <div class="main-area">
            <h2>The Brain Lab</h2>
            <div class="canvas-container">
                <canvas id="brain-canvas" width="600" height="400"></canvas>
            </div>
            <button class="back-btn" onclick="showScreen('screen-hub')">⬅ Back to Hub</button>
        </div>
    </div>

    <div id="screen-race" class="screen hidden arena-layout">
        <h2>The Arena</h2>
        <div class="teacher-tools">
            <button class="vote-btn">👍 Good Boy!</button>
            <button class="vote-btn">👎 Bad Form!</button>
            <button>⏭️ Next Generation</button>
        </div>
        <div class="canvas-container race-container">
            <canvas id="race-canvas" width="1000" height="400"></canvas>
        </div>
        <button class="back-btn" onclick="showScreen('screen-hub')">⬅ Back to Hub</button>
    </div>

    <script src="ui.js"></script>
</body>
</html>
